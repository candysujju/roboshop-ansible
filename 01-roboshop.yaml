# ansible-playbook -i localhost,\ -e {"instances":["mongodb","catalogue","redis","user","cart","mysql","shipping","rabbitmq","payment","frontend"]}" roboshop.yaml
- name: create ec2 instance and r53 records
  hosts: all
  connection: local
  vars:
    sg_id: sg-0dde2b2dbc55696ae
    ami_id: ami-0220d79f3f480ecf5
    subnet_id: subnet-05f89af555de452f2
    domain_name: "sujju.online"
    env: dev
    action: create
    instances:
       - mongodb
       - catalogue
       - redis
       - user
       - cart
       - mysql
       - shipping
       - rabbitmq
       - payment
       - frontend
###create###
  tasks:
    - name: create ec2 instance
      amazon.aws.ec2_instance:
        instance_type: "t3.micro"
        security_group: "{{ sg_id }}"
        vpc_subnet_id: "{{ subnet_id }}"
        image_id: "{{ ami_id }}"
        region: us-east-1
        name: "{{ item }}-{{ env }}"
        tags:
          Project: "roboshop"
          Component: "{{ item }}-{{ env }}"
          Environment: "{{ env }}"
          Name: "{{ item }}-{{ env }}"
      loop: "{{ instances }}" 
      register: ec2_output
      when: action == "create"

    - name:  print the ec2_output
      ansible.builtin.debug:
        msg: "{{ ec2_output }}"
      when: action == "create" 

    - name: create r53 records
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ item.item }}-{{ env }}.{{ domain_name }}" #mongodb-dev.sujju.online frontend-dev.sujju.online
        type: A
        ttl: 1
        value: "{{ item.instances[0].private_ip_address }}"
        wait: false
        overwrite: true
      loop: "{{ ec2_output.results }}" #list
      when: action == "create" 

    - name: create r53 records
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "roboshop-{{ item.item }}-{{ env }}.{{ domain_name }}" #roboshop-dev.sujju.online
        type: A
        ttl: 1
        value: "{{ item.instances[0].public_ip_address }}"
        wait: false
        overwrite: true
      loop: "{{ ec2_output.results }}"
      when: item.item == "frontend" 

  
    - name: delete route53 records (private)        
      amazon.aws.route53:
       zone: "{{ domain_name }}"
       state: absent        
       record: "{{ item }}-{{ env }}.{{ domain_name }}"
       type: A
       ttl: 1
      loop: "{{ instances }}"
      when: action == "destroy"

    - name: delete route53 records (public)        
      amazon.aws.route53:
       zone: "{{ domain_name }}"
       state: absent        
       record: "roboshop-{{ env }}.{{ domain_name }}"
       type: A
       ttl: 1
      when: action == "destroy" 
  
    - name: delete ec2 instance
      amazon.aws.ec2_instance: 
       name: "{{ item }}-{{ env }}"
       state: absent
       wait: false
      loop: "{{ instances }}"
      when: action == "destroy"
  
      

    

    
     

